name: boardstate_flutter
description: BoardState Flutter wrapper for iPhone-compatible WebView builds.
publish_to: "none"
version: 1.11.0+110

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/boardstate/
    - assets/boardstate/assets/
