<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#120c1b" />
    <title>BoardState</title>
    <link rel="icon" type="image/png" href="/boardstate/assets/Copilot_20260525_040326-B0aniXW4.png" />
    <link rel="preload" as="image" href="/boardstate/assets/boardstate-loading-dragon-A3IaZ8nV.jpg" type="image/jpeg" fetchpriority="high" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #05030a;
      }

      #boardstate-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: grid;
        background-color: #05030a;
      }

      body:not(.boardstate-app-ready) #app {
        visibility: hidden;
      }
    </style>
    <script type="module" crossorigin src="/boardstate/assets/index-BWVM6Xba.js"></script>
    <link rel="stylesheet" crossorigin href="/boardstate/assets/index-BJfhHXy6.css">
  </head>
  <body>
    <div id="boardstate-loader" class="boardstate-loading-screen" role="status" aria-live="polite" aria-label="BoardState loading">
      <div class="loading-arcane-frame" aria-hidden="true"></div>
      <div class="loading-dragon-glow" aria-hidden="true"></div>
      <div class="loading-wisp wisp-one" aria-hidden="true"></div>
      <div class="loading-wisp wisp-two" aria-hidden="true"></div>
      <div class="loading-wisp wisp-three" aria-hidden="true"></div>
      <section class="loading-copy">
        <h1>Board<span aria-hidden="true">✦</span>State</h1>
        <p data-loading-status>Awakening the board...</p>
      </section>
      <section class="loading-bar-shell" aria-label="Loading progress">
        <div class="loading-bar-frame">
          <div class="loading-bar-fill" data-loading-fill></div>
        </div>
        <span class="loading-percent" data-loading-percent>0%</span>
      </section>
      <section class="loading-recovery" data-loading-actions hidden>
        <p data-loading-details>Startup is taking longer than expected.</p>
        <div>
          <button type="button" data-loading-continue>Continue anyway</button>
          <button type="button" data-loading-reset>Reset stuck state</button>
          <button type="button" data-loading-fresh>Open fresh session</button>
        </div>
      </section>
    </div>
    <div id="app" aria-busy="true"></div>
  </body>
</html>
